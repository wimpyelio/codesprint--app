# Pre-commit hooks for security and code quality
# Install: pre-commit install
# Run manually: pre-commit run --all-files
# Update: pre-commit autoupdate

repos:
  # Secret detection - Find hardcoded credentials and secrets
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.2
    hooks:
      - id: gitleaks
        name: 🔐 Detect secrets with Gitleaks
        description: 'Prevents credentials from being committed'
        entry: gitleaks protect --source git --verbose
        language: system
        stages: [commit]
        pass_filenames: false
        always_run: true

  # General pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-added-large-files
        name: 🚫 Check for large files
        args: ['--maxkb=1000']
      
      - id: detect-private-key
        name: 🔑 Detect private keys
        description: 'Detects presence of private keys'
      
      - id: end-of-file-fixer
        name: 📝 Fix end of file
      
      - id: trailing-whitespace
        name: ⚪ Trim trailing whitespace
      
      - id: check-json
        name: ✓ Check JSON syntax
        files: '\.json$'
      
      - id: check-yaml
        name: ✓ Check YAML syntax
        files: '\.ya?ml$'
      
      - id: check-merge-conflict
        name: ❌ Check for merge conflicts
      
      - id: check-case-conflict
        name: 🔤 Check file name case conflicts

  # Environment variable checks
  - repo: local
    hooks:
      - id: check-env-files
        name: 🚫 Ensure .env files not committed
        entry: bash -c 'echo ".env" | grep -E "\.env(\.|$)" && echo "ERROR: .env files should not be committed" || true'
        language: system
        files: '^(?!\.env\.example).*\.env'
        stages: [commit]
        pass_filenames: false

  # Commit message linting
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.12.0
    hooks:
      - id: commitizen
        stages: [commit-msg]
        name: 📋 Verify commit message format
        description: 'Check commit message follows conventional commits'

  # ESLint (JavaScript/JSX)
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.54.0
    hooks:
      - id: eslint
        name: 📝 ESLint
        files: '\.[jt]sx?$'
        types: [javascript, jsx, typescript, tsx]
        additional_dependencies: 
          - 'eslint'
          - '@eslint/js'
          - 'eslint-plugin-react-hooks'
          - 'eslint-plugin-react-refresh'
        args: ['--max-warnings=0']
        fail_fast: true

  # npm audit for frontend
  - repo: local
    hooks:
      - id: npm-audit
        name: 📦 npm audit
        entry: bash -c 'cd frontend && npm audit --audit-level=moderate'
        language: system
        files: 'frontend/(package\.json|package-lock\.json)'
        stages: [manual]  # Run manually with: git hook run npm-audit
        pass_filenames: false

# Configuration
fail_fast: false
exclude: |
  (?x)^(
      node_modules/|
      frontend/node_modules/|
      backend/venv/|
      \.git/|
      dist/|
      build/
  )$
